<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#23140d" />
    <title>Spin Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css?v=20260323-core" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app">
        <header class="topbar">
          <div class="user-pill" id="currentUser">
            <span class="user-pill__avatar" id="currentUserAvatar">S</span>
            <div class="user-pill__info">
              <strong id="currentUserName">Starting...</strong>
              <small id="currentUserMeta">Connecting</small>
            </div>
          </div>
          <div class="status-pill status-pill--warn" id="statusPill">Launching Mini App...</div>
        </header>

        <main class="game-card">
          <div class="game-card__header">
            <div>
              <strong>Main room</strong>
              <small id="roomMeta">0 players online</small>
            </div>
            <div class="turn-pill" id="turnPill">Waiting for players</div>
          </div>

          <div class="table" id="table">
            <div class="table__ring"></div>
            <div class="players-layer" id="playersLayer"></div>
            <button class="bottle-button" id="spinButton" type="button" aria-label="Spin bottle">
              <span class="bottle-button__glass"></span>
            </button>
          </div>

          <div class="spin-result" id="spinResult">No spins yet</div>
        </main>

        <section class="chat-card">
          <div class="chat-card__header">
            <div>
              <strong>Room chat</strong>
              <small>Shared realtime chat</small>
            </div>
          </div>
          <div class="chat-feed" id="chatFeed"></div>
          <form class="chat-form" id="chatForm">
            <input id="chatInput" type="text" placeholder="Write a message" autocomplete="off" />
            <button type="submit">Send</button>
          </form>
        </section>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./app.js?v=20260323-core"></script>
  </body>
</html>
