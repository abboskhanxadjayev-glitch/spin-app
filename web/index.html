<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1d120d" />
    <title>Spin Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="./styles.css?v=20260323c" />
  </head>
  <body>
    <div class="app-shell">
      <div class="app" id="app">
        <header class="app-header">
          <div class="launch-strip">
            <div class="launch-pill launch-pill--warn" id="launchPill">
              Launching Mini App...
            </div>
          </div>

          <div class="status-strip">
            <button class="metric-heart" data-open="buyHearts" type="button">
              <span class="metric-heart__icon">&#10084;</span>
              <strong id="heartsCount">22</strong>
            </button>

            <button class="status-chip" data-open="seasonPass" type="button">
              <span class="status-chip__icon">&#127915;</span>
              <small>16 d.</small>
            </button>

            <button class="status-chip" data-open="event" type="button">
              <span class="status-chip__icon">&#9752;</span>
            </button>

            <button class="table-pill" data-open="dailyBonus" type="button">
              Table
              <strong id="tableCount">157</strong>
            </button>
          </div>
        </header>

        <section class="game-shell">
          <aside class="stage-actions" aria-label="Game actions">
            <button class="float-button" data-open="ratings" type="button" aria-label="Ratings">
              &#127942;
            </button>
            <button class="float-button" data-open="music" data-mode="audio" type="button" aria-label="Play audio">
              &#9835;
            </button>
            <button class="float-button" data-open="music" data-mode="video" type="button" aria-label="Play video clip">
              &#127909;
            </button>
            <button class="float-button" data-open="tables" type="button" aria-label="Tables">
              &#8635;
            </button>
            <button class="float-button" data-open="settings" type="button" aria-label="Settings">
              &#9881;
            </button>
            <button class="float-button" data-toggle="hubMenu" type="button" aria-label="Menu">
              &#9776;
            </button>
          </aside>

          <main class="stage">
            <div class="stage__surface">
              <div class="stage__glow"></div>
              <div class="turn-label" id="turnLabel">Jasur spins the bottle</div>
              <div class="table-badge" id="seasonBadge">Saint Patrick's Day</div>
              <div class="players-layer" id="playersLayer"></div>

              <button
                class="center-bottle"
                id="spinButton"
                data-action="spin"
                type="button"
                aria-label="Spin the bottle"
              >
                <span class="center-bottle__glass"></span>
              </button>

              <div class="choice-panel" id="choicePanel"></div>
              <div class="shop-strip" id="shopStrip" hidden></div>
            </div>
          </main>
        </section>

        <section class="media-panel" id="mediaPanel" hidden>
          <div class="media-panel__summary" id="mediaSummary"></div>
          <div class="media-panel__player" id="mediaPlayerWrap">
            <div id="youtubePlayerHost"></div>
          </div>
        </section>

        <section class="chat-panel">
          <div class="chat-panel__header">
            <div>
              <strong>Room chat</strong>
              <small>Latest room activity</small>
            </div>
          </div>
          <div class="chat-feed" id="chatFeed"></div>
          <div class="chat-entry">
            <input
              id="chatInput"
              type="text"
              autocomplete="off"
              placeholder="Write a message here"
            />
            <button data-action="sendChat" type="button" aria-label="Send">
              &#10148;
            </button>
          </div>
        </section>

        <div class="hub-menu hidden" id="hubMenu">
          <button data-open="achievements" type="button">
            <span>&#10004;</span>
            <span>Achievements</span>
          </button>
          <button data-open="ratings" type="button">
            <span>&#128202;</span>
            <span>Ratings</span>
          </button>
          <button data-open="bottle" type="button">
            <span>&#127866;</span>
            <span>Bottle</span>
          </button>
          <button data-open="styling" type="button">
            <span>&#11088;</span>
            <span>Styling</span>
          </button>
          <button data-open="boosters" type="button">
            <span>&#9889;</span>
            <span>Boosters</span>
          </button>
        </div>
      </div>
    </div>

    <div id="modalRoot"></div>
    <div class="toast hidden" id="toast"></div>

    <script src="/socket.io/socket.io.js"></script>
    <script type="module" src="./app.js?v=20260323c"></script>
  </body>
</html>
